version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: appraisal-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: appraisal_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appraisal_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appraisal_user -d appraisal_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
